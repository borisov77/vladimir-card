<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Владимир Борисов — FITSIZ</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d0d;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  font-family: 'Inter', sans-serif;
}
.card {
  width: 100%;
  max-width: 400px;
  background: #121212;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #1f1f1f;
}
.photo-section {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
}
.photo-section img.photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 15%;
  display: block;
}
.photo-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, #121212);
}
.green-bar { width: 100%; height: 3px; background: #42BA1A; }
.card-body { padding: 20px 24px 24px; }
.name {
  font-family: 'Russo One', sans-serif;
  font-size: 22px;
  color: #ffffff;
  letter-spacing: 0.01em;
  line-height: 1.1;
}
.role-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  margin-bottom: 16px;
}
.role { font-size: 11px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
.dot-sep { width: 3px; height: 3px; border-radius: 50%; background: #42BA1A; flex-shrink: 0; }
.brand-tags { display: flex; gap: 6px; margin-bottom: 18px; }
.tag { font-family: 'Russo One', sans-serif; font-size: 9px; letter-spacing: 0.12em; padding: 4px 8px; border-radius: 3px; }
.tag-green { background: rgba(66,186,26,0.15); color: #42BA1A; border: 1px solid rgba(66,186,26,0.25); }
.tag-yellow { background: rgba(194,217,24,0.1); color: #C2D918; border: 1px solid rgba(194,217,24,0.2); }
.divider { height: 1px; background: #1e1e1e; margin-bottom: 18px; }
.contacts { display: flex; flex-direction: column; gap: 11px; margin-bottom: 20px; }
.contact-row { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.c-dot { width: 5px; height: 5px; border-radius: 50%; background: #1e1e1e; border: 1px solid #2a2a2a; flex-shrink: 0; }
.c-dot.active { background: #42BA1A; border-color: #42BA1A; }
.c-lbl { font-size: 9px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; min-width: 52px; flex-shrink: 0; }
.c-val { font-size: 12px; color: #aaa; }
a.contact-row:hover .c-val { color: #42BA1A; }
.bottom-row { display: flex; align-items: center; gap: 16px; }
.qr-wrap { padding: 6px; background: #fff; border-radius: 8px; flex-shrink: 0; line-height: 0; }
.qr-wrap img { width: 80px; height: 80px; display: block; }
.qr-right { flex: 1; }
.qr-hint { font-size: 10px; color: #555; line-height: 1.5; margin-bottom: 8px; }
.save-btn {
  display: block;
  background: #42BA1A;
  color: #0a0a0a;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 14px;
  border-radius: 5px;
  text-decoration: none;
  text-align: center;
  margin-bottom: 6px;
}
.save-btn:hover { background: #4ed120; }
.save-note { font-size: 9px; color: #333; line-height: 1.5; }
.card-footer {
  padding: 10px 24px;
  background: #0d0d0d;
  border-top: 1px solid #181818;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-logo { font-family: 'Russo One', sans-serif; font-size: 11px; color: #42BA1A; letter-spacing: 0.08em; }
.footer-url { font-size: 9px; color: #333; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
